<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg"><rect width="1600" height="900" fill="#1A1028"/><text x="100" y="120" fill="#F5F3FF" font-size="60" font-family="Inter" font-weight="700">gemma4-agent-finetune</text><text x="100" y="178" fill="#C4B5FD" font-size="28" font-family="Inter">Visual Overview</text><rect x="100" y="230" width="560" height="560" rx="24" fill="#22163A" stroke="#4C1D95"/><rect x="700" y="230" width="800" height="260" rx="24" fill="#22163A" stroke="#4C1D95"/><rect x="700" y="530" width="800" height="260" rx="24" fill="#22163A" stroke="#4C1D95"/><text x="140" y="300" fill="#DDD6FE" font-size="28" font-family="Inter" font-weight="600">Training Control Surface</text><text x="140" y="355" fill="#C4B5FD" font-size="21" font-family="JetBrains Mono">• Runtime: GPU training orchestration</text><text x="140" y="395" fill="#C4B5FD" font-size="21" font-family="JetBrains Mono">• Core: LoRA fine-tuning workflow</text><text x="140" y="435" fill="#C4B5FD" font-size="21" font-family="JetBrains Mono">• Surface: script-driven reproducible runs</text><text x="740" y="300" fill="#DDD6FE" font-size="26" font-family="Inter">Run Sequence</text><text x="740" y="350" fill="#A78BFA" font-size="22" font-family="Inter">1. Activate env + WANDB vars</text><text x="740" y="388" fill="#A78BFA" font-size="22" font-family="Inter">2. Clear GPU cache and bootstrap run</text><text x="740" y="426" fill="#A78BFA" font-size="22" font-family="Inter">3. Persist logs for iterative tuning</text><text x="740" y="600" fill="#DDD6FE" font-size="26" font-family="Inter">Risk Controls</text><text x="740" y="650" fill="#F0ABFC" font-size="22" font-family="Inter">- OOM guardrails via batch/context tuning</text><text x="740" y="688" fill="#F0ABFC" font-size="22" font-family="Inter">- Scripted, reproducible launch path</text><text x="740" y="726" fill="#F0ABFC" font-size="22" font-family="Inter">- Explicit status docs and run artifacts</text></svg>